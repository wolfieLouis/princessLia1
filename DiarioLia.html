<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌸 PrincessLia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0008;color:#fce4ff;font-family:Georgia,serif;font-size:14px}
input,textarea,select,button{font-family:Georgia,serif;font-size:13px;box-sizing:border-box}
.inp{background:#080005;border:1px solid #3d0035;color:#fce4ff;border-radius:8px;padding:9px 12px;width:100%;outline:none}
.inp:focus{border-color:#e91e8c}
.btn{cursor:pointer;border:1px solid #3d0035;border-radius:8px;padding:8px 14px;background:#1a0018;color:#fce4ff;display:inline-block}
.btnp{background:#e91e8c;color:#fff;border-color:#e91e8c}
.btnd{background:#5a0000;color:#fff;border-color:#5a0000}
.btns{padding:5px 10px;font-size:12px}
.card{background:#1a0018;border:1px solid #3d0035;border-radius:12px;padding:14px;margin-bottom:10px}
.muted{color:#a06090;font-size:11px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#hdr{padding:12px 14px;border-bottom:1px solid #3d0035;background:#130010;display:flex;justify-content:space-between;align-items:center}
#nav{padding:8px 10px;border-bottom:1px solid #3d0035;background:#130010;display:flex;gap:4px;overflow-x:auto}
.tab{background:none;border:1px solid transparent;border-radius:8px;padding:7px 11px;color:#a06090;font-size:12px;cursor:pointer;white-space:nowrap}
.tab.on{background:#e91e8c22;color:#ff6ec7;border-color:#e91e8c44}
.pg{display:none;padding:12px}
.pg.on{display:block}
.overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:50;overflow-y:auto;padding:50px 10px}
.overlay.on{display:block}
.box{background:#1a0018;border:1px solid #e91e8c44;border-radius:13px;padding:20px;width:94%;max-width:380px;margin:0 auto}
.box h3{color:#ff6ec7;margin-bottom:14px;font-size:14px}
.pbar{background:#080005;border-radius:6px;height:8px;overflow:hidden;margin:5px 0}
.pfill{height:100%;background:linear-gradient(90deg,#8b0066,#e91e8c);border-radius:6px}
</style>
</head>
<body>
<div id="hdr">
  <div>
    <div style="color:#ff6ec7;font-weight:700;font-size:15px">🌸 PrincessLia</div>
    <div class="muted">UCI · 2do año · Agenda personal</div>
  </div>
  <div style="text-align:right;max-width:190px">
    <div style="color:#ffd700;font-size:9px;letter-spacing:1px">✦ HOY ✦</div>
    <div id="hv" style="color:#ffb3e6;font-size:10px;font-style:italic;line-height:1.4"></div>
  </div>
</div>
<div id="nav">
  <button class="tab on" data-pg="dev">✝️ Devocional</button>
  <button class="tab" data-pg="agenda">📅 Agenda</button>
  <button class="tab" data-pg="verses">📖 Versículos</button>
  <button class="tab" data-pg="notas">📝 Notas</button>
  <button class="tab" data-pg="metas">🎯 Metas</button>
  <button class="tab" data-pg="diario">🔒 Diario</button>
</div>
<div id="pg-dev" class="pg on"></div>
<div id="pg-agenda" class="pg"></div>
<div id="pg-verses" class="pg"></div>
<div id="pg-notas" class="pg"></div>
<div id="pg-metas" class="pg"></div>
<div id="pg-diario" class="pg"></div>
<div class="overlay" id="modal-layer"></div>
<script>
var S={};
function initData(){
  var def={
    verses:[
      {ref:"Filipenses 4:13",text:"Todo lo puedo en Cristo que me fortalece.",cat:"Fortaleza"},
      {ref:"Salmos 23:1",text:"El Señor es mi pastor; nada me faltará.",cat:"Confianza"},
      {ref:"Juan 3:16",text:"De tal manera amó Dios al mundo que dio a su Hijo unigénito.",cat:"Amor"},
      {ref:"Romanos 8:28",text:"A los que aman a Dios, todas las cosas les ayudan a bien.",cat:"Fe"},
      {ref:"Proverbios 31:25",text:"Se reviste de fuerza y dignidad, y afronta segura el porvenir.",cat:"Mujer"},
      {ref:"Isaías 40:31",text:"Los que esperan en el Señor renovarán sus fuerzas.",cat:"Fortaleza"},
      {ref:"Jeremías 29:11",text:"Yo sé los planes para vosotros: planes de bienestar.",cat:"Fe"},
      {ref:"Mateo 6:33",text:"Buscad primero el reino de Dios y su justicia.",cat:"Fe"},
      {ref:"Salmos 46:1",text:"Dios es nuestro amparo y fortaleza, pronto auxilio.",cat:"Confianza"},
      {ref:"Proverbios 3:5",text:"Confía en el Señor con todo tu corazón.",cat:"Confianza"}
    ],
    vcats:["Fortaleza","Confianza","Amor","Fe","Mujer"],
    prayers:[
      {id:1,text:"Sabiduría para los exámenes",cat:"Estudios",done:false,date:"hoy"},
      {id:2,text:"Salud de mis padres",cat:"Familia",done:false,date:"hoy"}
    ],
    pcats:["Familia","Estudios","Salud","Iglesia","Personal","Amigos","Gratitud"],
    materias:[
      {name:"Base de Datos I",color:"#4f8ef7"},
      {name:"Estructura de Datos II",color:"#3ecf8e"},
      {name:"Programación",color:"#f7c94f"},
      {name:"Inglés",color:"#f76f6f"},
      {name:"Matemáticas",color:"#a78bfa"},
      {name:"Iglesia",color:"#ffd700"},
      {name:"Personal",color:"#ff6ec7"},
      {name:"General",color:"#a06090"}
    ],
    events:[
      {id:1,day:1,title:"Clase BD I",mat:"Base de Datos I",hora:"08:00",done:false},
      {id:2,day:1,title:"Práctica Estructuras",mat:"Estructura de Datos II",hora:"10:00",done:false},
      {id:3,day:3,title:"Entrega tarea SQL",mat:"Base de Datos I",hora:"23:59",done:false},
      {id:4,day:5,title:"Ensayo iglesia",mat:"Iglesia",hora:"18:00",done:false},
      {id:5,day:0,title:"Culto dominical",mat:"Iglesia",hora:"09:00",done:false}
    ],
    notas:[
      {id:1,title:"Consultas SQL básicas",body:"SELECT * FROM tabla;\nSELECT campo FROM tabla WHERE condición;",cat:"Base de Datos I"},
      {id:2,title:"Versículo favorito",body:"Filipenses 4:13 - Todo lo puedo en Cristo que me fortalece.",cat:"Devocional"}
    ],
    ncats:["Base de Datos I","Estructura de Datos II","Programación","Matemáticas","Iglesia","Devocional","General"],
    metas:[
      {id:1,title:"Leer la Biblia completa",cat:"Espiritual",prog:15,total:100,unit:"%"},
      {id:2,title:"Aprobar Base de Datos I",cat:"Académico",prog:0,total:1,unit:"examen"},
      {id:3,title:"Memorizar 20 versículos",cat:"Espiritual",prog:5,total:20,unit:"versículos"}
    ],
    mcats:["Espiritual","Académico","Personal","Iglesia"],
    diary:[],
    refl:""
  };
  Object.keys(def).forEach(function(k){
    var v=null;
    try{var r=localStorage.getItem('lia_'+k);if(r!==null)v=JSON.parse(r);}catch(e){}
    S[k]=v!==null?v:def[k];
  });
}
function sv(k){try{localStorage.setItem('lia_'+k,JSON.stringify(S[k]));}catch(e){}}
function uid(){return Date.now()+Math.floor(Math.random()*99999);}
function x(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tod(){return new Date().toLocaleDateString('es-ES');}
function showModal(html){
  var l=document.getElementById('modal-layer');
  l.innerHTML='<div class="box">'+html+'</div>';
  l.className='overlay on';
  l.onclick=function(e){if(e.target===l)closeModal();};
}
function closeModal(){
  var l=document.getElementById('modal-layer');
  l.className='overlay';l.innerHTML='';
}
document.getElementById('nav').addEventListener('click',function(e){
  var t=e.target.closest('.tab');if(!t)return;
  var pg=t.getAttribute('data-pg');if(!pg)return;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  t.classList.add('on');
  document.getElementById('pg-'+pg).classList.add('on');
  ({dev:renderDev,agenda:renderAgenda,verses:renderVerses,notas:renderNotas,metas:renderMetas,diario:renderDiario})[pg]();
});
var DV=[
  {ref:"Filipenses 4:13",text:"Todo lo puedo en Cristo que me fortalece."},
  {ref:"Salmos 23:1",text:"El Señor es mi pastor; nada me faltará."},
  {ref:"Proverbios 3:5",text:"Fíate de Jehová de todo tu corazón."},
  {ref:"Jeremías 29:11",text:"Yo sé los planes que tengo para vosotros."},
  {ref:"Isaías 40:31",text:"Los que esperan en el Señor renovarán sus fuerzas."},
  {ref:"Hebreos 11:1",text:"La fe es la certeza de lo que se espera."},
  {ref:"Mateo 6:33",text:"Busca primero el reino de Dios y su justicia."},
  {ref:"Salmos 46:1",text:"Dios es nuestro amparo y fortaleza."},
  {ref:"Juan 13:34",text:"Ámense los unos a los otros como yo los he amado."},
  {ref:"Romanos 12:2",text:"No se amolden al mundo sino transfórmense."},
  {ref:"Proverbios 31:25",text:"Se reviste de fuerza y dignidad, y afronta segura el porvenir."},
  {ref:"Deuteronomio 31:6",text:"Sed fuertes y valientes. No temáis ni os aterréis."}
];
function gdv(){var d=new Date();return DV[(d.getDate()+d.getMonth())%DV.length];}
var pCatF='Todas';
function renderDev(){
  var v=gdv();
  document.getElementById('hv').textContent='"'+v.text.slice(0,45)+'..."';
  document.getElementById('pg-dev').innerHTML=
    '<div style="background:linear-gradient(135deg,#1a0018,#2d0025);border:1px solid #e91e8c33;border-radius:12px;padding:18px;text-align:center;margin-bottom:10px">'
    +'<div style="color:#ffd700;font-size:10px;letter-spacing:2px;margin-bottom:10px">✦ VERSÍCULO DEL DÍA ✦</div>'
    +'<div style="font-size:14px;line-height:1.8;color:#ffb3e6;font-style:italic;margin-bottom:8px">"'+x(v.text)+'"</div>'
    +'<div style="color:#ff6ec7;font-size:12px">— '+x(v.ref)+'</div></div>'
    +'<div class="card"><div class="muted" style="margin-bottom:8px">✍️ MI REFLEXIÓN DE HOY</div>'
    +'<textarea id="refl-ta" class="inp" rows="4" placeholder="¿Qué te habló Dios hoy?..." style="resize:none;line-height:1.7">'+x(S.refl)+'</textarea>'
    +'<div style="margin-top:8px;display:flex;gap:8px;align-items:center">'
    +'<button id="refl-btn" class="btn btnp btns">💾 Guardar</button>'
    +'<span id="refl-ok" style="color:#ff6ec7;font-size:11px;display:none">✓ Guardado</span>'
    +'</div></div>'
    +'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<div class="muted">🙏 PETICIONES DE ORACIÓN</div>'
    +'<button id="btn-new-p" class="btn btnp btns">+ Nueva</button></div>'
    +'<div id="pcats-f" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px"></div>'
    +'<div id="prayer-list"></div></div>';
  document.getElementById('refl-btn').onclick=function(){
    S.refl=document.getElementById('refl-ta').value;sv('refl');
    var ok=document.getElementById('refl-ok');ok.style.display='inline';
    setTimeout(function(){ok.style.display='none';},2000);
  };
  document.getElementById('btn-new-p').onclick=function(){openPrayerModal(null);};
  renderPrayers();
}
function renderPrayers(){
  var pf=document.getElementById('pcats-f');if(!pf)return;
  pf.innerHTML='';
  ['Todas'].concat(S.pcats).forEach(function(c){
    var b=document.createElement('button');
    b.className='btn btns';b.textContent=c;
    b.style.background=pCatF===c?'#e91e8c':'#1a0018';
    b.style.color=pCatF===c?'#fff':'#a06090';
    b.onclick=function(){pCatF=c;renderPrayers();};
    pf.appendChild(b);
  });
  var list=document.getElementById('prayer-list');if(!list)return;
  var items=pCatF==='Todas'?S.prayers:S.prayers.filter(function(p){return p.cat===pCatF;});
  if(!items.length){list.innerHTML='<div class="muted" style="text-align:center;padding:14px">Sin peticiones aún 🙏</div>';return;}
  list.innerHTML='';
  items.forEach(function(p){
    var d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:8px;margin-bottom:6px;background:'+(p.done?'#0a150a':'#0d0008')+';border:1px solid '+(p.done?'#1e3a1e':'#3d0035');
    d.innerHTML='<button class="tog-p" data-id="'+p.id+'" style="flex-shrink:0;background:none;border:2px solid '+(p.done?'#ffd700':'#e91e8c')+';border-radius:50%;width:22px;height:22px;cursor:pointer;color:'+(p.done?'#ffd700':'transparent')+';font-size:11px">'+(p.done?'✓':'')+'</button>'
      +'<div style="flex:1"><div style="font-size:13px;text-decoration:'+(p.done?'line-through':'none')+';color:'+(p.done?'#a06090':'#fce4ff')+'">'+x(p.text)+'</div>'
      +'<div style="font-size:10px;color:#e91e8c">'+x(p.cat)+' · '+x(p.date)+'</div></div>'
      +'<button class="edit-p" data-id="'+p.id+'" style="background:none;border:none;color:#a06090;cursor:pointer;font-size:14px">✏️</button>'
      +'<button class="del-p" data-id="'+p.id+'" style="background:none;border:none;color:#c00;cursor:pointer;font-size:18px">×</button>';
    list.appendChild(d);
  });
  list.querySelectorAll('.tog-p').forEach(function(b){b.onclick=function(){
    var id=Number(b.getAttribute('data-id'));
    S.prayers=S.prayers.map(function(p){return p.id===id?Object.assign({},p,{done:!p.done}):p;});
    sv('prayers');renderPrayers();
  };});
  list.querySelectorAll('.edit-p').forEach(function(b){b.onclick=function(){openPrayerModal(Number(b.getAttribute('data-id')));};});
  list.querySelectorAll('.del-p').forEach(function(b){b.onclick=function(){
    if(!confirm('¿Eliminar?'))return;
    S.prayers=S.prayers.filter(function(p){return p.id!==Number(b.getAttribute('data-id'));});
    sv('prayers');renderPrayers();
  };});
}
function openPrayerModal(id){
  var p=id?S.prayers.find(function(xx){return xx.id===id;}):null;
  var opts=S.pcats.map(function(c){return'<option'+(p&&p.cat===c?' selected':'')+'>'+x(c)+'</option>';}).join('');
  showModal('<h3>'+(p?'Editar':'Nueva')+' petición</h3>'
    +'<input id="m-pt" class="inp" value="'+x(p?p.text:'')+'" placeholder="Petición..." style="margin-bottom:8px"/>'
    +'<select id="m-pc" class="inp" style="margin-bottom:12px">'+opts+'</select>'
    +'<div class="row"><button id="m-psave" class="btn btnp">Guardar</button>'
    +'<button id="m-pcancel" class="btn">Cancelar</button>'
    +'<button id="m-pcats" class="btn btns">⚙️ Cats</button></div>');
  document.getElementById('m-psave').onclick=function(){
    var t=document.getElementById('m-pt').value.trim();if(!t)return;
    var c=document.getElementById('m-pc').value;
    if(p){S.prayers=S.prayers.map(function(pp){return pp.id===id?Object.assign({},pp,{text:t,cat:c}):pp;});}
    else{S.prayers.unshift({id:uid(),text:t,cat:c,done:false,date:tod()});}
    sv('prayers');closeModal();renderPrayers();
  };
  document.getElementById('m-pcancel').onclick=closeModal;
  document.getElementById('m-pcats').onclick=function(){closeModal();openCatModal('pcats','Categorías de oración',function(){openPrayerModal(null);});};
}
var selDay=new Date().getDay();
var DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function renderAgenda(){
  var pg=document.getElementById('pg-agenda');
  var db=DIAS.map(function(d,i){
    var has=S.events.some(function(e){return e.day===i;});
    return'<button class="btn day-btn" data-d="'+i+'" style="flex:1;padding:8px 2px;font-size:12px;position:relative;background:'+(selDay===i?'#e91e8c':'#1a0018')+';color:'+(selDay===i?'#fff':'#a06090')+';border-color:'+(selDay===i?'#e91e8c':'#3d0035')+'">'+d+(has?'<span style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:#ffd700;display:block"></span>':'')+'</button>';
  }).join('');
  pg.innerHTML='<div style="display:flex;gap:4px;margin-bottom:10px">'+db+'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div class="muted">📅 '+DIAS[selDay]+'</div>'
    +'<div class="row"><button id="btn-new-ev" class="btn btnp btns">+ Evento</button>'
    +'<button id="btn-mat-mgr" class="btn btns">⚙️ Materias</button></div></div>'
    +'<div id="ev-list"></div>';
  pg.querySelectorAll('.day-btn').forEach(function(b){b.onclick=function(){selDay=Number(b.getAttribute('data-d'));renderAgenda();};});
  document.getElementById('btn-new-ev').onclick=function(){openEvModal(null);};
  document.getElementById('btn-mat-mgr').onclick=openMatModal;
  renderEvents();
}
function renderEvents(){
  var list=document.getElementById('ev-list');if(!list)return;
  var evs=S.events.filter(function(e){return e.day===selDay;}).sort(function(a,b){return(a.hora||'').localeCompare(b.hora||'');});
  if(!evs.length){list.innerHTML='<div class="card" style="text-align:center;color:#a06090">Día libre 🌸</div>';return;}
  list.innerHTML='';
  evs.forEach(function(ev){
    var mat=S.materias.find(function(m){return m.name===ev.mat;})||{color:'#a06090'};
    var d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:8px;padding:11px;border-radius:10px;margin-bottom:8px;background:#0d0008;border:1px solid '+mat.color+'44;border-left:3px solid '+mat.color+';opacity:'+(ev.done?0.5:1);
    d.innerHTML='<button class="tog-e" data-id="'+ev.id+'" style="flex-shrink:0;background:none;border:2px solid '+(ev.done?'#ffd700':mat.color)+';border-radius:50%;width:22px;height:22px;cursor:pointer;color:'+(ev.done?'#ffd700':'transparent')+';font-size:11px">'+(ev.done?'✓':'')+'</button>'
      +'<div style="flex:1"><div style="font-size:13px;text-decoration:'+(ev.done?'line-through':'none')+'">'+x(ev.title)+'</div>'
      +'<div style="font-size:10px;color:'+mat.color+'">'+x(ev.mat)+(ev.hora?' · '+x(ev.hora):'')+'</div></div>'
      +'<button class="edit-e" data-id="'+ev.id+'" style="background:none;border:none;color:#a06090;cursor:pointer;font-size:14px">✏️</button>'
      +'<button class="del-e" data-id="'+ev.id+'" style="background:none;border:none;color:#c00;cursor:pointer;font-size:18px">×</button>';
    list.appendChild(d);
  });
  list.querySelectorAll('.tog-e').forEach(function(b){b.onclick=function(){
    var id=Number(b.getAttribute('data-id'));
    S.events=S.events.map(function(e){return e.id===id?Object.assign({},e,{done:!e.done}):e;});
    sv('events');renderEvents();
  };});
  list.querySelectorAll('.edit-e').forEach(function(b){b.onclick=function(){openEvModal(Number(b.getAttribute('data-id')));};});
  list.querySelectorAll('.del-e').forEach(function(b){b.onclick=function(){
    if(!confirm('¿Eliminar?'))return;
    S.events=S.events.filter(function(e){return e.id!==Number(b.getAttribute('data-id'));});
    sv('events');renderAgenda();
  };});
}
function openEvModal(id){
  var ev=id?S.events.find(function(e){return e.id===id;}):null;
  var mo=S.materias.map(function(m){return'<option'+(ev&&ev.mat===m.name?' selected':'')+'>'+x(m.name)+'</option>';}).join('');
  showModal('<h3>'+(ev?'Editar evento':'Nuevo evento — '+DIAS[selDay])+'</h3>'
    +'<input id="m-et" class="inp" value="'+x(ev?ev.title:'')+'" placeholder="Descripción..." style="margin-bottom:8px"/>'
    +'<input id="m-eh" class="inp" value="'+x(ev?ev.hora:'')+'" placeholder="Hora (08:00)" style="margin-bottom:8px"/>'
    +'<select id="m-em" class="inp" style="margin-bottom:12px">'+mo+'</select>'
    +'<div class="row"><button id="m-esave" class="btn btnp">Guardar</button><button id="m-ecancel" class="btn">Cancelar</button></div>');
  document.getElementById('m-esave').onclick=function(){
    var t=document.getElementById('m-et').value.trim();if(!t)return;
    var h=document.getElementById('m-eh').value.trim();
    var m=document.getElementById('m-em').value;
    if(ev){S.events=S.events.map(function(e){return e.id===id?Object.assign({},e,{title:t,hora:h,mat:m}):e;});}
    else{S.events.push({id:uid(),day:selDay,title:t,mat:m,hora:h,done:false});}
    sv('events');closeModal();renderAgenda();
  };
  document.getElementById('m-ecancel').onclick=closeModal;
}
function openMatModal(){
  var rows=S.materias.map(function(m,i){
    return'<div class="row" style="margin-bottom:6px">'
      +'<input class="inp mat-name" data-i="'+i+'" value="'+x(m.name)+'" style="flex:1"/>'
      +'<input type="color" class="mat-color" data-i="'+i+'" value="'+m.color+'" style="width:32px;height:32px;border:none;background:none;cursor:pointer"/>'
      +'<button class="btn btnd btns del-mat" data-i="'+i+'">×</button></div>';
  }).join('');
  showModal('<h3>⚙️ Materias</h3>'+rows
    +'<div class="row" style="margin-top:10px">'
    +'<button id="m-matadd" class="btn btnp btns">+ Añadir</button>'
    +'<button id="m-matsave" class="btn btns">💾 Guardar</button>'
    +'<button id="m-matcancel" class="btn btns">Cerrar</button></div>');
  document.getElementById('m-matadd').onclick=function(){S.materias.push({name:'Nueva materia',color:'#a06090'});openMatModal();};
  document.getElementById('m-matsave').onclick=function(){
    document.querySelectorAll('.mat-name').forEach(function(inp){var i=Number(inp.getAttribute('data-i'));S.materias[i].name=inp.value.trim()||S.materias[i].name;});

// ── DIARIO CON CONTRASEÑA ──
var diaryUnlocked=false;
var DIARY_PASS='Teamo';

function renderDiario(){
  var pg=document.getElementById('pg-diario');
  if(!S.diary)S.diary=[];
  if(!diaryUnlocked){
    pg.innerHTML='<div class="card" style="text-align:center;padding:30px 20px">'
      +'<div style="font-size:32px;margin-bottom:12px">🔒</div>'
      +'<div style="color:#ff6ec7;font-size:14px;margin-bottom:6px;font-weight:700">Diario privado de PrincessLia</div>'
      +'<div class="muted" style="margin-bottom:16px">Este espacio es solo tuyo ??</div>'
      +'<input id="pass-inp" class="inp" type="password" placeholder="Contraseña..." style="margin-bottom:10px;text-align:center"/>'
      +'<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
      +'<button id="pass-enter" class="btn btnp">Entrar</button>'
      +'<button id="pass-change" class="btn btns">🔑 Cambiar contraseña</button>'
      +'</div>'
      +'<div id="pass-err" style="color:#f76f6f;font-size:11px;margin-top:8px;display:none">Contraseña incorrecta 💔</div>'
      +'</div>';
    document.getElementById('pass-enter').onclick=checkPass;
    document.getElementById('pass-inp').onkeydown=function(e){if(e.key==='Enter')checkPass();};
    document.getElementById('pass-change').onclick=openChangePass;
    return;
  }
  var cards=S.diary.slice().reverse().map(function(e){
    return'<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      +'<div style="color:#ff6ec7;font-size:12px">🔒 '+x(e.date)+'</div>'
      +'<button class="del-d btn btns btnd" data-id="'+e.id+'">×</button></div>'
      +'<div style="font-size:13px;white-space:pre-wrap;line-height:1.7">'+x(e.text)+'</div></div>';
  }).join('');
  pg.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="color:#ff6ec7;font-size:13px;font-weight:700">🌸 Mi diario personal</div>'
    +'<div class="row">'
    +'<button id="diary-lock" class="btn btns">🔒 Cerrar</button>'
    +'<button id="diary-chpass" class="btn btns">🔑 Cambiar clave</button>'
    +'</div></div>'
    +'<div class="card">'
    +'<div class="muted" style="margin-bottom:8px">+ Nueva entrada</div>'
    +'<textarea id="diary-ta" class="inp" rows="5" placeholder="Escribe tus pensamientos..." style="resize:none;line-height:1.7"></textarea>'
    +'<div style="margin-top:8px"><button id="diary-save" class="btn btnp btns">💾 Guardar entrada</button></div></div>'
    +(cards||'<div class="muted" style="text-align:center;padding:14px">Aún no hay entradas 🌸</div>');
  document.getElementById('diary-save').onclick=function(){
    var t=document.getElementById('diary-ta').value.trim();if(!t)return;
    S.diary.push({id:uid(),date:new Date().toLocaleString('es-ES'),text:t});
    sv('diary');renderDiario();
  };
  document.getElementById('diary-lock').onclick=function(){diaryUnlocked=false;renderDiario();};
  document.getElementById('diary-chpass').onclick=openChangePass;
  pg.querySelectorAll('.del-d').forEach(function(b){b.onclick=function(){
    if(!confirm('¿Eliminar entrada?'))return;
    S.diary=S.diary.filter(function(e){return e.id!==Number(b.getAttribute('data-id'));});
    sv('diary');renderDiario();
  };});
}

function checkPass(){
  var inp=document.getElementById('pass-inp');
  var err=document.getElementById('pass-err');
  var stored=localStorage.getItem('lia_diarypass')||DIARY_PASS;
  if(inp.value===stored){
    diaryUnlocked=true;renderDiario();
  } else {
    err.style.display='block';
    inp.value='';
    setTimeout(function(){err.style.display='none';},2000);
  }
}

function openChangePass(){
  showModal('<h3>🔑 Cambiar contraseña del diario</h3>'
    +'<input id="cp-old" class="inp" type="password" placeholder="Contraseña actual..." style="margin-bottom:8px"/>'
    +'<input id="cp-new" class="inp" type="password" placeholder="Nueva contraseña..." style="margin-bottom:8px"/>'
    +'<input id="cp-rep" class="inp" type="password" placeholder="Repetir nueva contraseña..." style="margin-bottom:12px"/>'
    +'<div id="cp-err" style="color:#f76f6f;font-size:11px;margin-bottom:8px;display:none"></div>'
    +'<div class="row"><button id="cp-save" class="btn btnp">Guardar</button><button id="cp-cancel" class="btn">Cancelar</button></div>');
  document.getElementById('cp-save').onclick=function(){
    var old=document.getElementById('cp-old').value;
    var nw=document.getElementById('cp-new').value.trim();
    var rp=document.getElementById('cp-rep').value.trim();
    var err=document.getElementById('cp-err');
    var stored=localStorage.getItem('lia_diarypass')||DIARY_PASS;
    if(old!==stored){err.textContent='Contraseña actual incorrecta 💔';err.style.display='block';return;}
    if(!nw){err.textContent='La nueva contraseña no puede estar vacía.';err.style.display='block';return;}
    if(nw!==rp){err.textContent='Las contraseñas no coinciden 💔';err.style.display='block';return;}
    localStorage.setItem('lia_diarypass',nw);
    closeModal();
    alert('✓ Contraseña cambiada con éxito 🌸');
  };
  document.getElementById('cp-cancel').onclick=closeModal;
}

function openCatModal(key,title,onDone){
  var rows=S[key].map(function(c,i){
    return'<div class="row" style="margin-bottom:6px">'
      +'<input class="inp cat-inp" data-i="'+i+'" value="'+x(c)+'" style="flex:1"/>'
      +'<button class="btn btnd btns del-cat" data-i="'+i+'">×</button></div>';
  }).join('');
  showModal('<h3>⚙️ '+x(title)+'</h3>'+rows
    +'<div class="row" style="margin-top:10px">'
    +'<button id="m-catadd" class="btn btnp btns">+ Añadir</button>'
    +'<button id="m-catsave" class="btn btns">💾 Guardar</button>'
    +'<button id="m-catcancel" class="btn btns">Cerrar</button></div>');
  document.getElementById('m-catadd').onclick=function(){S[key].push('Nueva');openCatModal(key,title,onDone);};
  document.getElementById('m-catsave').onclick=function(){
    var nc=[];
    document.querySelectorAll('.cat-inp').forEach(function(inp){var v=inp.value.trim();if(v)nc.push(v);});
    S[key]=nc;sv(key);closeModal();if(onDone)onDone();
  };
  document.querySelectorAll('.del-cat').forEach(function(b){b.onclick=function(){S[key].splice(Number(b.getAttribute('data-i')),1);openCatModal(key,title,onDone);};});
  document.getElementById('m-catcancel').onclick=closeModal;
}

renderDev();
