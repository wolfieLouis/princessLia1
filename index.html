<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌸 PrincessLia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0008;color:#fce4ff;font-family:Georgia,serif;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#3d0035;border-radius:4px}
input,textarea,select,button{font-family:Georgia,serif;font-size:13px;box-sizing:border-box}
.inp{background:#080005;border:1px solid #3d0035;color:#fce4ff;border-radius:8px;padding:8px 11px;width:100%;outline:none}
.inp:focus{border-color:#e91e8c}
.btn{cursor:pointer;border:1px solid #3d0035;border-radius:8px;padding:7px 13px;background:#1a0018;color:#fce4ff;white-space:nowrap}
.btn-p{background:#e91e8c;color:#fff;border-color:#e91e8c}
.btn-d{background:#5a0000;color:#fff;border-color:#5a0000}
.btn-s{padding:4px 9px;font-size:11px}
.card{background:#1a0018;border:1px solid #3d0035;border-radius:11px;padding:13px}
.muted{color:#a06090;font-size:11px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#hdr{padding:10px 14px;border-bottom:1px solid #3d0035;display:flex;justify-content:space-between;align-items:center;background:#130010;flex-shrink:0}
#nav{display:flex;gap:3px;padding:6px 10px;border-bottom:1px solid #3d0035;overflow-x:auto;flex-shrink:0;background:#130010}
.tab{background:none;border:1px solid transparent;border-radius:8px;padding:6px 10px;color:#a06090;font-size:11px;cursor:pointer;white-space:nowrap}
.tab.on{background:#e91e8c22;color:#ff6ec7;border-color:#e91e8c44}
#body{flex:1;overflow:hidden;padding:11px}
.pg{display:none;height:100%;overflow-y:auto;flex-direction:column;gap:10px}
.pg.on{display:flex}
.overlay{display:none;position:fixed;inset:0;background:#000000bb;z-index:50;align-items:center;justify-content:center}
.overlay.on{display:flex}
.box{background:#1a0018;border:1px solid #e91e8c44;border-radius:13px;padding:20px;width:92%;max-width:370px;max-height:82vh;overflow-y:auto}
.box h3{color:#ff6ec7;margin-bottom:13px;font-size:14px}
.pbar{background:#080005;border-radius:6px;height:8px;overflow:hidden;margin:5px 0}
.pfill{height:100%;background:linear-gradient(90deg,#8b0066,#e91e8c);border-radius:6px}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div style="color:#ff6ec7;font-weight:700;font-size:15px">🌸 PrincessLia</div>
    <div class="muted">UCI · 2do año · Agenda personal</div>
  </div>
  <div style="text-align:right;max-width:190px">
    <div style="color:#ffd700;font-size:9px;letter-spacing:1px">✦ HOY ✦</div>
    <div id="hv" style="color:#ffb3e6;font-size:10px;font-style:italic;line-height:1.4"></div>
  </div>
</div>

<div id="nav">
  <button class="tab on" data-pg="dev">✝️ Devocional</button>
  <button class="tab" data-pg="agenda">📅 Agenda</button>
  <button class="tab" data-pg="verses">📖 Versículos</button>
  <button class="tab" data-pg="notas">📝 Notas</button>
  <button class="tab" data-pg="metas">🎯 Metas</button>
  <button class="tab" data-pg="diario">🔒 Diario</button>
</div>

<div id="body">
  <div id="pg-dev" class="pg on"></div>
  <div id="pg-agenda" class="pg"></div>
  <div id="pg-verses" class="pg"></div>
  <div id="pg-notas" class="pg" style="overflow:hidden"></div>
  <div id="pg-metas" class="pg"></div>
  <div id="pg-diario" class="pg"></div>
</div>

<!-- modals container -->
<div id="modals"></div>

<script>
// ─── STORAGE ────────────────────────────────────────────────────────────────
var M={};
function sg(k){try{var v=localStorage.getItem('L_'+k);if(v)return JSON.parse(v);}catch(e){}return M[k]!==undefined?M[k]:null;}
function ss(k,v){try{localStorage.setItem('L_'+k,JSON.stringify(v));}catch(e){}M[k]=v;}
function sd(k,d){var v=sg(k);if(v!==null){M[k]=v;return v;}ss(k,d);return d;}

// ─── DATA ────────────────────────────────────────────────────────────────────
var D={
  verses: sd('verses',[
    {ref:"Filipenses 4:13",text:"Todo lo puedo en Cristo que me fortalece.",cat:"Fortaleza"},
    {ref:"Salmos 23:1",text:"El Señor es mi pastor; nada me faltará.",cat:"Confianza"},
    {ref:"Juan 3:16",text:"De tal manera amó Dios al mundo que dio a su Hijo unigénito.",cat:"Amor"},
    {ref:"Romanos 8:28",text:"A los que aman a Dios, todas las cosas les ayudan a bien.",cat:"Fe"},
    {ref:"Proverbios 31:25",text:"Se reviste de fuerza y dignidad, y afronta segura el porvenir.",cat:"Mujer"},
    {ref:"Isaías 40:31",text:"Los que esperan en el Señor renovarán sus fuerzas.",cat:"Fortaleza"},
    {ref:"Jeremías 29:11",text:"Yo sé los planes que tengo para vosotros: planes de bienestar.",cat:"Fe"},
    {ref:"Mateo 6:33",text:"Buscad primero el reino de Dios y su justicia.",cat:"Fe"},
    {ref:"Salmos 46:1",text:"Dios es nuestro amparo y fortaleza, pronto auxilio en tribulaciones.",cat:"Confianza"},
    {ref:"Proverbios 3:5",text:"Confía en el Señor con todo tu corazón.",cat:"Confianza"},
  ]),
  vcats: sd('vcats',["Fortaleza","Confianza","Amor","Fe","Mujer"]),
  prayers: sd('prayers',[
    {id:1,text:"Sabiduría para los exámenes",cat:"Estudios",done:false,date:"hoy"},
    {id:2,text:"Salud de mis padres",cat:"Familia",done:false,date:"hoy"},
  ]),
  pcats: sd('pcats',["Familia","Estudios","Salud","Iglesia","Personal","Amigos","Gratitud"]),
  materias: sd('materias',[
    {name:"Base de Datos I",color:"#4f8ef7"},{name:"Estructura de Datos II",color:"#3ecf8e"},
    {name:"Programación",color:"#f7c94f"},{name:"Inglés",color:"#f76f6f"},
    {name:"Matemáticas",color:"#a78bfa"},{name:"Iglesia",color:"#ffd700"},
    {name:"Personal",color:"#ff6ec7"},{name:"General",color:"#a06090"},
  ]),
  events: sd('events',[
    {id:1,day:1,title:"Clase BD I",mat:"Base de Datos I",hora:"08:00",done:false},
    {id:2,day:1,title:"Práctica Estructuras",mat:"Estructura de Datos II",hora:"10:00",done:false},
    {id:3,day:3,title:"Entrega tarea SQL",mat:"Base de Datos I",hora:"23:59",done:false},
    {id:4,day:5,title:"Ensayo iglesia",mat:"Iglesia",hora:"18:00",done:false},
    {id:5,day:0,title:"Culto dominical",mat:"Iglesia",hora:"09:00",done:false},
  ]),
  notas: sd('notas',[
    {id:1,title:"Consultas SQL básicas",body:"SELECT * FROM tabla;\nSELECT campo FROM tabla WHERE condición;",cat:"Base de Datos I"},
    {id:2,title:"Versículo favorito",body:"Filipenses 4:13 - Todo lo puedo en Cristo que me fortalece.",cat:"Devocional"},
  ]),
  ncats: sd('ncats',["Base de Datos I","Estructura de Datos II","Programación","Matemáticas","Iglesia","Devocional","General"]),
  metas: sd('metas',[
    {id:1,title:"Leer la Biblia completa",cat:"Espiritual",prog:15,total:100,unit:"%"},
    {id:2,title:"Aprobar Base de Datos I",cat:"Académico",prog:0,total:1,unit:"examen"},
    {id:3,title:"Memorizar 20 versículos",cat:"Espiritual",prog:5,total:20,unit:"versículos"},
  ]),
  mcats: sd('mcats',["Espiritual","Académico","Personal","Iglesia"]),
  diary: sd('diary',[]),
  refl: sd('refl',''),
};
function sv(k){ss(k,D[k]);}
function uid(){return Date.now()+Math.floor(Math.random()*99999);}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tod(){return new Date().toLocaleDateString('es-ES');}

// ─── DAILY VERSE ─────────────────────────────────────────────────────────────
var DV=[
  {ref:"Filipenses 4:13",text:"Todo lo puedo en Cristo que me fortalece."},
  {ref:"Salmos 23:1",text:"El Señor es mi pastor; nada me faltará."},
  {ref:"Proverbios 3:5",text:"Fíate de Jehová de todo tu corazón."},
  {ref:"Jeremías 29:11",text:"Yo sé los planes que tengo para vosotros."},
  {ref:"Isaías 40:31",text:"Los que esperan en el Señor renovarán sus fuerzas."},
  {ref:"Hebreos 11:1",text:"La fe es la certeza de lo que se espera."},
  {ref:"Mateo 6:33",text:"Busca primero el reino de Dios y su justicia."},
  {ref:"Salmos 46:1",text:"Dios es nuestro amparo y fortaleza."},
  {ref:"Juan 13:34",text:"Ámense los unos a los otros como yo los he amado."},
  {ref:"Romanos 12:2",text:"No se amolden al mundo sino transfórmense."},
  {ref:"Proverbios 31:25",text:"Se reviste de fuerza y dignidad, y afronta segura el porvenir."},
  {ref:"Deuteronomio 31:6",text:"Sed fuertes y valientes. No temáis ni os aterréis."},
];
function gdv(){var d=new Date();return DV[(d.getDate()+d.getMonth())%DV.length];}

// ─── MODAL ───────────────────────────────────────────────────────────────────
var activeModal=null;
function showModal(html){
  var c=document.getElementById('modals');
  c.innerHTML='<div class="overlay on" id="cur-overlay">'+html+'</div>';
  activeModal=document.getElementById('cur-overlay');
  activeModal.addEventListener('click',function(e){if(e.target===activeModal)closeModal();});
}
function closeModal(){var c=document.getElementById('modals');c.innerHTML='';activeModal=null;}

// ─── NAV ─────────────────────────────────────────────────────────────────────
var curPg='dev';
document.getElementById('nav').addEventListener('click',function(e){
  var t=e.target.closest('.tab'); if(!t) return;
  var pg=t.dataset.pg; if(!pg) return;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  t.classList.add('on');
  document.getElementById('pg-'+pg).classList.add('on');
  curPg=pg;
  renders[pg]&&renders[pg]();
});

// ─── DEVOCIONAL ──────────────────────────────────────────────────────────────
var pCatF='Todas', editPid=null;

function renderDev(){
  var v=gdv();
  document.getElementById('hv').textContent='"'+v.text.slice(0,45)+'..."';
  var pg=document.getElementById('pg-dev');
  pg.innerHTML=
    '<div style="background:linear-gradient(135deg,#1a0018,#2d0025);border:1px solid #e91e8c33;border-radius:12px;padding:18px;text-align:center">'
    +'<div style="color:#ffd700;font-size:10px;letter-spacing:2px;margin-bottom:10px">✦ VERSÍCULO DEL DÍA ✦</div>'
    +'<div style="font-size:14px;line-height:1.8;color:#ffb3e6;font-style:italic;margin-bottom:8px">"'+x(v.text)+'"</div>'
    +'<div style="color:#ff6ec7;font-size:12px">— '+x(v.ref)+'</div></div>'
    +'<div class="card">'
    +'<div class="muted" style="margin-bottom:8px">✍️ MI REFLEXIÓN DE HOY</div>'
    +'<textarea id="refl-ta" class="inp" rows="4" placeholder="¿Qué te habló Dios hoy?..." style="resize:none;line-height:1.7">'+x(D.refl)+'</textarea>'
    +'<div style="margin-top:8px;display:flex;gap:8px;align-items:center">'
    +'<button class="btn btn-p btn-s" id="refl-btn">💾 Guardar</button>'
    +'<span id="refl-ok" style="color:#ff6ec7;font-size:11px;display:none">✓ Guardado</span>'
    +'</div></div>'
    +'<div class="card" style="flex:1">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<div class="muted">🙏 PETICIONES DE ORACIÓN</div>'
    +'<button class="btn btn-p btn-s" id="btn-new-prayer">+ Nueva</button></div>'
    +'<div id="pcats-f" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px"></div>'
    +'<div id="prayer-list"></div></div>';

  document.getElementById('refl-btn').onclick=function(){
    D.refl=document.getElementById('refl-ta').value; sv('refl');
    var ok=document.getElementById('refl-ok'); ok.style.display='inline';
    setTimeout(function(){ok.style.display='none';},2000);
  };
  document.getElementById('btn-new-prayer').onclick=function(){openPrayerModal(null);};
  renderPrayers();
}

function renderPrayers(){
  var pf=document.getElementById('pcats-f'); if(!pf) return;
  pf.innerHTML='';
  ['Todas'].concat(D.pcats).forEach(function(c){
    var b=document.createElement('button');
    b.className='btn btn-s';
    b.textContent=c;
    b.style.background=pCatF===c?'#e91e8c':'#1a0018';
    b.style.color=pCatF===c?'#fff':'#a06090';
    b.onclick=function(){pCatF=c;renderPrayers();};
    pf.appendChild(b);
  });
  var list=document.getElementById('prayer-list'); if(!list) return;
  var items=pCatF==='Todas'?D.prayers:D.prayers.filter(function(p){return p.cat===pCatF;});
  if(!items.length){list.innerHTML='<div class="muted" style="text-align:center;padding:14px">Sin peticiones aún 🙏</div>';return;}
  list.innerHTML='';
  items.forEach(function(p){
    var d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:'+(p.done?'#0a150a':'#0d0008')+';border:1px solid '+(p.done?'#1e3a1e':'#3d0035');
    d.innerHTML='<button class="tog-p" data-id="'+p.id+'" style="flex-shrink:0;background:none;border:2px solid '+(p.done?'#ffd700':'#e91e8c')+';border-radius:50%;width:20px;height:20px;cursor:pointer;color:'+(p.done?'#ffd700':'transparent')+';font-size:10px">'+(p.done?'✓':'')+'</button>'
      +'<div style="flex:1"><div style="font-size:12px;text-decoration:'+(p.done?'line-through':'none')+';color:'+(p.done?'#a06090':'#fce4ff')+'">'+x(p.text)+'</div>'
      +'<div style="font-size:10px;color:#e91e8c">'+x(p.cat)+' · '+x(p.date)+'</div></div>'
      +'<button class="edit-p btn-s" data-id="'+p.id+'" style="background:none;border:none;color:#a06090;cursor:pointer;font-size:13px">✏️</button>'
      +'<button class="del-p" data-id="'+p.id+'" style="background:none;border:none;color:#5a0000;cursor:pointer;font-size:17px">×</button>';
    list.appendChild(d);
  });
  list.querySelectorAll('.tog-p').forEach(function(b){b.onclick=function(){
    var id=Number(b.dataset.id); D.prayers=D.prayers.map(function(p){return p.id===id?Object.assign({},p,{done:!p.done}):p;}); sv('prayers'); renderPrayers();
  };});
  list.querySelectorAll('.edit-p').forEach(function(b){b.onclick=function(){openPrayerModal(Number(b.dataset.id));};});
  list.querySelectorAll('.del-p').forEach(function(b){b.onclick=function(){
    if(!confirm('¿Eliminar?'))return;
    var id=Number(b.dataset.id); D.prayers=D.prayers.filter(function(p){return p.id!==id;}); sv('prayers'); renderPrayers();
  };});
}

function openPrayerModal(id){
  var p=id?D.prayers.find(function(x2){return x2.id===id;}):null;
  var catsOpts=D.pcats.map(function(c){return '<option'+(p&&p.cat===c?' selected':'')+'>'+x(c)+'</option>';}).join('');
  showModal('<div class="box">'
    +'<h3>'+(p?'Editar':'Nueva')+' petición</h3>'
    +'<input id="m-pt" class="inp" value="'+x(p?p.text:'')+'" placeholder="Petición..." style="margin-bottom:8px"/>'
    +'<select id="m-pc" class="inp" style="margin-bottom:12px">'+catsOpts+'</select>'
    +'<div class="row">'
    +'<button class="btn btn-p" id="m-psave">Guardar</button>'
    +'<button class="btn" id="m-pcancel">Cancelar</button>'
    +(p?'<button class="btn btn-d btn-s" id="m-pcat-mgr">⚙️ Categorías</button>':'')
    +'</div></div>');
  document.getElementById('m-psave').onclick=function(){
    var t=document.getElementById('m-pt').value.trim(); if(!t)return;
    var c=document.getElementById('m-pc').value;
    if(p){D.prayers=D.prayers.map(function(pp){return pp.id===id?Object.assign({},pp,{text:t,cat:c}):pp;});}
    else{D.prayers.unshift({id:uid(),text:t,cat:c,done:false,date:tod()});}
    sv('prayers'); closeModal(); renderPrayers();
  };
  document.getElementById('m-pcancel').onclick=closeModal;
  var mb=document.getElementById('m-pcat-mgr');
  if(mb) mb.onclick=function(){closeModal();openPcatModal();};
}

function openPcatModal(){
  function html(){
    return '<div class="box"><h3>Categorías de oración</h3><div id="m-pcl">'
      +D.pcats.map(function(c,i){return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #3d0035">'+x(c)+'<button class="btn btn-d btn-s dpc" data-i="'+i+'">×</button></div>';}).join('')
      +'</div><div class="row" style="margin-top:10px"><input id="m-pcn" class="inp" placeholder="Nueva..." style="flex:1"/><button class="btn btn-p" id="m-pcadd">+</button></div>'
      +'<button class="btn" style="margin-top:10px;width:100%" id="m-pcclose">Cerrar</button></div>';
  }
  showModal(html());
  function bind(){
    document.querySelectorAll('.dpc').forEach(function(b){b.onclick=function(){
      D.pcats.splice(Number(b.dataset.i),1);sv('pcats');
      document.getElementById('m-pcl').outerHTML=''; showModal(html()); bind();
    };});
    document.getElementById('m-pcadd').onclick=function(){
      var v=document.getElementById('m-pcn').value.trim();if(!v||D.pcats.indexOf(v)>=0)return;
      D.pcats.push(v);sv('pcats');showModal(html());bind();
    };
    document.getElementById('m-pcclose').onclick=closeModal;
  }
  bind();
}

// ─── AGENDA ──────────────────────────────────────────────────────────────────
var selDay=new Date().getDay(), editEvId=null;
var DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function renderAgenda(){
  var pg=document.getElementById('pg-agenda');
  var dayBtns=DIAS.map(function(d,i){
    var has=D.events.some(function(e){return e.day===i;});
    return '<button class="btn day-btn" data-d="'+i+'" style="flex:1;padding:7px 2px;font-size:11px;position:relative;background:'+(selDay===i?'#e91e8c':'#1a0018')+';color:'+(selDay===i?'#fff':'#a06090')+';border-color:'+(selDay===i?'#e91e8c':'#3d0035')+'">'+d+(has?'<span style="position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:#ffd700;display:block"></span>':'')+'</button>';
  }).join('');
  pg.innerHTML='<div style="display:flex;gap:4px">'+dayBtns+'</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center">'
    +'<div class="muted">📅 '+DIAS[selDay]+'</div>'
    +'<div class="row"><button class="btn btn-p btn-s" id="btn-new-ev">+ Evento</button>'
    +'<button class="btn btn-s" id="btn-mat-mgr">⚙️ Materias</button></div></div>'
    +'<div class="card" style="flex:1;overflow-y:auto"><div id="ev-list"></div></div>';

  pg.querySelectorAll('.day-btn').forEach(function(b){b.onclick=function(){selDay=Number(b.dataset.d);renderAgenda();};});
  document.getElementById('btn-new-ev').onclick=function(){openEvModal(null);};
  document.getElementById('btn-mat-mgr').onclick=openMatModal;
  renderEvents();
}

function renderEvents(){
  var list=document.getElementById('ev-list'); if(!list)return;
  var evs=D.events.filter(function(e){return e.day===selDay;}).sort(function(a,b){return (a.hora||'').localeCompare(b.hora||'');});
  if(!evs.length){list.innerHTML='<div class="muted" style="text-align:center;padding:18px">Día libre 🌸</div>';return;}
  list.innerHTML='';
  evs.forEach(function(ev){
    var mat=D.materias.find(function(m){return m.name===ev.mat;})||{color:'#a06090'};
    var d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;margin-bottom:8px;opacity:'+(ev.done?.5:1)+';background:#0d0008;border:1px solid '+mat.color+'44;border-left:3px solid '+mat.color;
    d.innerHTML='<button class="tog-e" data-id="'+ev.id+'" style="flex-shrink:0;background:none;border:2px solid '+(ev.done?'#ffd700':mat.color)+';border-radius:50%;width:20px;height:20px;cursor:pointer;color:'+(ev.done?'#ffd700':'transparent')+';font-size:10px">'+(ev.done?'✓':'')+'</button>'
      +'<div style="flex:1"><div style="font-size:12px;text-decoration:'+(ev.done?'line-through':'none')+'">'+x(ev.title)+'</div>'
      +'<div style="font-size:10px;color:'+mat.color+'">'+x(ev.mat)+(ev.hora?' · '+x(ev.hora):'')+'</div></div>'
      +'<button class="edit-e" data-id="'+ev.id+'" style="background:none;border:none;color:#a06090;cursor:pointer;font-size:13px">✏️</button>'
      +'<button class="del-e" data-id="'+ev.id+'" style="background:none;border:none;color:#5a0000;cursor:pointer;font-size:17px">×</button>';
    list.appendChild(d);
  });
  list.querySelectorAll('.tog-e').forEach(function(b){b.onclick=function(){
    var id=Number(b.dataset.id);D.events=D.events.map(function(e){return e.id===id?Object.assign({},e,{done:!e.done}):e;});sv('events');renderEvents();
  };});
  list.querySelectorAll('.edit-e').forEach(function(b){b.onclick=function(){openEvModal(Number(b.dataset.id));};});
  l
